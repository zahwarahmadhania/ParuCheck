{% extends "base.html" %}

{% block title %}Daftar Akun - ParuCheck{% endblock %}

{% block content %}
<div class="container py-5 px-md-5">
    <div class="row justify-content-center my-4">
        <div class="col-md-6 col-lg-5">
            <!-- Register Card -->
            <div class="card card-modern border-0 shadow-lg p-4 p-md-5 bg-white">
                <!-- Header -->
                <div class="text-center mb-4">
                    <svg class="mb-3" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 16.5c-1.5 1.26-2.5 3.19-2.5 5.5h20c0-2.31-1-4.24-2.5-5.5"></path>
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"></path>
                        <circle cx="12" cy="12" r="3" fill="#14B8A6"></circle>
                    </svg>
                    <h3 class="fw-bold text-slate">Daftar Akun Baru</h3>
                    <p class="text-muted small">Buat akun untuk merekam riwayat skrining paru secara aman.</p>
                </div>
                
                <!-- Form -->
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-slate small">Nama Pengguna (Username)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="fa-regular fa-user text-muted"></i></span>
                            <input type="text" class="form-control rounded-end-3 bg-light-subtle" id="username" name="username" placeholder="Masukkan username baru" required>
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-slate small">Alamat Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="fa-regular fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control rounded-end-3 bg-light-subtle" id="email" name="email" placeholder="Contoh: nama@domain.com" required>
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold text-slate small">Kata Sandi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control rounded-end-3 bg-light-subtle" id="password" name="password" placeholder="Masukkan kata sandi baru" required>
                        </div>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold text-slate small">Konfirmasi Kata Sandi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="fa-solid fa-lock-open text-muted"></i></span>
                            <input type="password" class="form-control rounded-end-3 bg-light-subtle" id="confirm_password" name="confirm_password" placeholder="Ulangi kata sandi" required>
                        </div>
                    </div>
                    
                    <!-- Submit -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-teal rounded-pill py-2-5">
                            Daftar Akun <i class="fa-solid fa-user-plus ms-2"></i>
                        </button>
                    </div>
                    
                    <!-- Footer Link -->
                    <div class="text-center">
                        <span class="text-muted small">Sudah punya akun? <a href="{{ url_for('auth.login') }}" class="text-teal text-decoration-none fw-semibold">Masuk Saja</a></span>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
